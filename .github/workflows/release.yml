name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
            os: linux
          - target: x86_64-apple-darwin
            runner: macos-latest
            os: macos
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: macos
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libdbus-1-dev cmake perl

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build web frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set crate version
        env:
          SLASHA_VERSION: ${{ github.ref_name }}
        run: bun run scripts/release/replace-version.cjs

      - name: Build binary
        run: cargo build --release -p slasha-cli --target ${{ matrix.target }}

      - name: Package
        run: |
          asset="slasha-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" slasha
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}
          retention-days: 1

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum slasha-*.tar.gz > SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/slasha-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: false
          fail_on_unmatched_files: true
