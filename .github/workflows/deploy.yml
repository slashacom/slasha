name: Deploy to production

on:
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/slashacom/slasha:${{ github.sha }}
            ghcr.io/slashacom/slasha:nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to prod
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up SSH agent (infra deploy key)
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.INFRA_DEPLOY_KEY }}

      - name: Clone infra
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone --depth 1 git@github.com:slashacom/infra.git

      - name: Deploy
        env:
          SLASHA_REF: ${{ github.sha }}
          SLASHA_IMAGE_TAG: ${{ github.sha }}
        working-directory: infra
        run: ./scripts/deploy.sh
