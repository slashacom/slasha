services:
  slasha:
    # Prod pulls this prebuilt image from GHCR (built + pushed by the
    # "Deploy to production" workflow). :nightly tracks the tip of main;
    # deploys pin an immutable :<sha>. The build: block below is only for
    # local use (`make docker-up`); prod never builds.
    image: ghcr.io/slashacom/slasha:${SLASHA_IMAGE_TAG:-nightly}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: slasha
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - slasha-data:/home/slasha/.slasha
      - slasha-ssh:/home/slasha/.ssh
    env_file:
      - ../.env
    restart: unless-stopped

volumes:
  slasha-data:
  slasha-ssh:
